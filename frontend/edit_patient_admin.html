<!DOCTYPE html>
<html>
<head>

    <title>Edit Patient Page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        body{

            margin:0;

            padding:0;

            background:#f1f5f9;

            font-family:Arial, Helvetica, sans-serif;

            min-height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        #form-body{

            width:400px;

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.1);

        }

        .page-title{

            text-align:center;

            margin-bottom:25px;

            color:#0f172a;

            font-weight:bold;

        }

        .form-label{

            font-weight:600;

            margin-bottom:6px;

        }

        .form-control{

            height:45px;

            border-radius:10px;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:none;

        }

        .btn-update{

            width:100%;

            height:45px;

            border:none;

            border-radius:10px;

            background:#2563eb;

            color:white;

            font-weight:bold;

            transition:0.3s;

        }

        .btn-update:hover{

            background:#1d4ed8;

        }

        .alert{

            border-radius:10px;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="form-body">

        <h2 class="page-title">

            <i class="fa-solid fa-user-pen me-2"></i>

            Update Patient

        </h2>

        <div
        v-if="message"
        :class="success ? 'alert alert-success' : 'alert alert-danger'">

            [[ message ]]

        </div>

        <form
        v-if="patient"
        @submit.prevent="updatePatient">

            <div class="mb-3">

                <label class="form-label">

                    Patient Name

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.pname"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Doctor Name

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.dname"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Department Name

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.department"
                required>

            </div>

            <button
            type="submit"
            class="btn-update">

                Update Patient

            </button>

        </form>

    </div>

</div>

<script>

new Vue({

    el:'#app',

    delimiters:["[[","]]"],

    data:{

        patient:null,

        form:{

            pname:"",

            dname:"",

            department:""

        },

        message:"",

        success:false

    },

    mounted(){

        const id =
        window.location.pathname.split("/").pop()

        this.fetchPatient(id)

    },

    methods:{

        fetchPatient(id){

            fetch("/admin/get_patient/" + id)

            .then(res => res.json())

            .then(data => {

                this.patient = data

                this.form.pname =
                data.Patient_name

                this.form.dname =
                data.Doctor_name

                this.form.department =
                data.Department_name

            })

            .catch(err => {

                console.log(err)

            })

        },

        updatePatient(){

            const id =
            this.patient.Patient_id

            fetch(`/admin/edit_patient/${id}`,{

                method:"PUT",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify({

                    Patient_name:
                    this.form.pname,

                    Doctor_name:
                    this.form.dname,

                    Department_name:
                    this.form.department

                })

            })

            .then(res => res.json())

            .then(data => {

                this.message =
                data.message

                this.success = true

                setTimeout(() => {

                    window.location =
                    '/admin_dashboard'

                },2000)

            })

            .catch(err => {

                console.log(err)

                this.success = false

                this.message =
                "Some Error Occurred. Try Again!"

            })

        }

    }

})

</script>

</body>
</html>
