<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
        #form-body{
            height:401px;
            margin-top:200px;
        }
    </style>
</head>
<body>
    <div id="app">
            <div id="form-body">
                <h1>Login Form</h1>
                <div v-if="message" :class="success ? 'alert alert-success' : 'alert alert-danger'">
                    [[ message ]]
                </div>
                <form @submit.prevent="login">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" v-model="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="Password" class="form-control" v-model="password" required>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Login"><br>
                        Are you a new user? <a href="/register">Register</a>
                    </div>
                </form>
            </div>
    <script>
        new Vue({
            el: '#app',

            delimiters: ['[[', ']]'],

            data:{username:"", password:"", message:"", success:false},

            methods:{
                login(){
                    fetch("/login", {method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({username:this.username, password:this.password})
                    })

                    .then(async res => {
                        let data = await res.json()
                            if (!res.ok) {
                                throw data 
                            }
                            return data
                    })
                    .then(data => {
                        this.success = true
                        this.message = data.message || "Login Successful!"

                        if (data.type === 'admin') {
                            setTimeout(() => {
                                window.location = '/admin_dashboard'
                            }, 2000)
                        }

                        else if (data.type === 'doctor') {
                            setTimeout(() => {
                                window.location = '/doctor_dashboard'
                            }, 2000)
                        }

                        else if (data.type === 'patient') {
                            setTimeout(() => {
                                window.location = '/patient_dashboard'
                            }, 2000)
                        }
                        else{
                            this.message = data.message
                        }
                        setTimeout(() => {
                        }, 2000)
                    })
                    
                    .catch((err) =>{
                        this.success = false
                        this.message = err.message
                        })
                    },

                }
            }

        )

    </script>
</body>
</html>
