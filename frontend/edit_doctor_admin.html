<!DOCTYPE html>
<html>
<head>

    <title>Update Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        body{

            background:#f1f5f9;

            font-family:Arial, Helvetica, sans-serif;

        }

        #app{

            display:flex;

            justify-content:center;

            align-items:center;

            min-height:100vh;

        }

        #form-body{

            width:420px;

            background:white;

            padding:30px;

            border-radius:18px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.08);

        }

        .page-title{

            text-align:center;

            margin-bottom:25px;

            color:#0f172a;

            font-weight:bold;

        }

        .form-label{

            font-weight:600;

            margin-bottom:6px;

        }

        .form-control{

            height:45px;

            border-radius:10px;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:none;

        }

        .btn-update{

            width:100%;

            height:45px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:10px;

            font-weight:bold;

        }

        .btn-update:hover{

            background:#1d4ed8;

        }

        .alert{

            border-radius:10px;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="form-body">

        <h2 class="page-title">

            <i class="fa-solid fa-user-doctor me-2"></i>

            Update Doctor

        </h2>

        <div
        v-if="message"
        :class="success ? 'alert alert-success' : 'alert alert-danger'">

            [[ message ]]

        </div>

        <form
        v-if="doctor"
        @submit.prevent="updateDoctor">

            <div class="mb-3">

                <label class="form-label">

                    Doctor Name

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.doctorname"
                placeholder="Enter doctor name">

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Department Name

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.department"
                placeholder="Enter department">

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Experience (Years)

                </label>

                <input
                type="number"
                class="form-control"
                v-model="form.experience"
                placeholder="Enter experience">

            </div>

            <button
            type="submit"
            class="btn-update">

                Update Doctor

            </button>

        </form>

    </div>

</div>

<script>

new Vue({

    el:'#app',

    delimiters:["[[","]]"],

    data:{

        doctor:null,

        form:{

            doctorname:"",

            department:"",

            experience:""

        },

        message:"",

        success:false

    },

    mounted(){

        const id =
        window.location.pathname.split("/").pop()

        this.fetchDoctor(id)

    },

    methods:{

        fetchDoctor(id){

            fetch("/admin/get_doctor/" + id)

            .then(res => res.json())

            .then(data => {

                this.doctor = data

                this.form.doctorname =
                data.Doctor_name

                this.form.department =
                data.Department_name

                this.form.experience =
                data.Experience

            })

            .catch(err => {

                console.log(err)

            })

        },

        updateDoctor(){

            const id =
            this.doctor.Doctor_id

            fetch(`/admin/edit_doctor/${id}`,{

                method:"PUT",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify({

                    Doctor_name:
                    this.form.doctorname,

                    Department_name:
                    this.form.department,

                    Experience:
                    this.form.experience

                })

            })

            .then(res => res.json())

            .then(data => {

                this.message =
                data.message

                this.success = true

                setTimeout(() => {

                    window.location =
                    '/admin_dashboard'

                },2000)

            })

            .catch(err => {

                console.log(err)

                this.success = false

                this.message =
                "Some error occurred. Try again!"

            })

        }

    }

})

</script>

</body>
</html>
