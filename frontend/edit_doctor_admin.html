<!DOCTYPE html>
<html>
<head>
    <title>Edit Doctor Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
    #form-body{
    border:1px solid grey;
    width:300px;
    height:450px;
    margin:auto;
    margin-top:200px;
    border-radius:5px;
    padding:10px
}
    </style>
</head>
<body>
    <div id="app">
    <!-- <div id="main">
        <div id="canvas"> -->
            <div id="form-body">
                <h2>Update Patient</h2>
                <div v-if="message" :class="success ? 'alert alert-success' : 'alert alert-danger'">
                    [[ message ]]
                </div>
                <form v-if="doctor" @submit.prevent="updateDoctor">
                    <div class="mb-3">
                        <label>Doctor Name</label>
                        <input type="text" class="form-control" v-model="form.doctorname">
                    </div>
                    <div class="mb-3">
                        <label>Department Name</label>
                        <input type="text" class="form-control" v-model="form.department">
                    </div>
                    <div class="mb-3">
                        <label>Experience (in years)</label>
                        <input type="text" class="form-control" v-model="form.experience">
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Update">
                    </div>
                </form>
            </div>
        </div>
    <!-- </div>
    </div> -->
    <script>
        new Vue({ 
        el: '#app',
        delimiters: ["[[","]]"],
        data: {
            doctor: null,
            form: {
                doctorname: "",
                department: "",
                experience: ""
            },
            message: "",
            success: false
        },

        mounted: function(){
            const id = window.location.pathname.split("/").pop();
            this.fetchDoctor(id);
        },

        methods: {
            fetchDoctor: function(id) {
                fetch("/admin/get_doctor/" + id)
                .then(function(res) {
                    return res.json();
                })

                .then((data) => {
                    this.doctor = data;

                    this.form.doctorname = data.Doctor_name;
                    this.form.department = data.Department_name;
                    this.form.experience = data.Experience;
                })

                .catch(function(err) {
                    console.log(err);
                });
            },

            updateDoctor: function() {
                const id = this.doctor.Doctor_id;
                fetch(`/admin/edit_doctor/${id}`, {
                    method: "PUT",
                    headers: {
                        "Content-Type":"application/json"
                    },
                    credentials:"include",
                    body: JSON.stringify({
                        Doctor_name: this.form.doctorname,
                        Department_name: this.form.department,
                        Experience: this.form.experience
                    })
                })

                    .then(function(res) {
                        return res.json();
                    })
                    .then((data) => {
                        this.message = data.message;
                        this.success = true;

                        setTimeout(() => {
                            window.location = '/admin_dashboard'
                        }, 2000)
                    })
                    .catch((err) => {
                        console.log(err);
                        this.success = false;
                        this.message = "Some Error Occured. Try Again!"
                    });
                }
    
            }
        });    
    </script>
</body>
</html>
