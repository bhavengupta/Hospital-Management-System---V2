<!DOCTYPE html>
<html>
<head>

    <title>Doctor Availability</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        body{

            margin:0;

            padding:30px;

            background:#f1f5f9;

            font-family:Arial, Helvetica, sans-serif;

        }

        #main-container{

            max-width:900px;

            margin:auto;

        }

        .card-box{

            background:white;

            border-radius:15px;

            padding:30px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.08);

            margin-bottom:25px;

        }

        .page-title{

            text-align:center;

            margin-bottom:25px;

            color:#0f172a;

            font-weight:bold;

        }

        .form-label{

            font-weight:600;

        }

        .form-control{

            height:45px;

            border-radius:10px;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:none;

        }

        .btn-save{

            width:100%;

            height:45px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:10px;

            font-weight:bold;

        }

        .btn-save:hover{

            background:#1d4ed8;

        }

        .table{

            margin-top:15px;

        }

        .table thead{

            background:#2563eb;

            color:white;

        }

        .table th{

            padding:14px;

        }

        .table td{

            padding:14px;

            vertical-align:middle;

        }

        .btn-back{

            background:#0f172a;

            color:white;

            border:none;

            padding:10px 20px;

            border-radius:8px;

            margin-top:10px;

        }

        .btn-back:hover{

            background:#1e293b;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="main-container">

        <div class="card-box">

            <h2 class="page-title">

                <i class="fa-solid fa-calendar-check me-2"></i>

                Doctor Availability

            </h2>

            <form @submit.prevent="saveAvailability">

                <div class="mb-3">

                    <label class="form-label">

                        Date

                    </label>

                    <input
                    type="date"
                    class="form-control"
                    v-model="form.Date"
                    required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Start Time

                    </label>

                    <input
                    type="time"
                    class="form-control"
                    v-model="form.Start_time"
                    required>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        End Time

                    </label>

                    <input
                    type="time"
                    class="form-control"
                    v-model="form.End_time"
                    required>

                </div>

                <button
                type="submit"
                class="btn-save">

                    Save Availability

                </button>

            </form>

        </div>

        <div class="card-box">

            <h4 class="mb-3">

                Your Availability Schedule

            </h4>

            <div v-if="availabilities.length > 0">

                <table class="table table-bordered">

                    <thead>

                        <tr>

                            <th>Date</th>

                            <th>Start Time</th>

                            <th>End Time</th>

                            <th>Status</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr
                        v-for="a in availabilities"
                        :key="a.id">

                            <td>
                                [[ a.Date ]]
                            </td>

                            <td>
                                [[ a.Start_time ]]
                            </td>

                            <td>
                                [[ a.End_time ]]
                            </td>

                            <td>

                                <span
                                v-if="a.Is_available"
                                class="badge bg-success">

                                    Available

                                </span>

                                <span
                                v-else
                                class="badge bg-danger">

                                    Not Available

                                </span>

                            </td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <div
            v-else
            class="text-center text-muted">

                No availability added yet!

            </div>

            <button
            class="btn-back"
            @click="goBack">

                Back to Dashboard

            </button>

        </div>

    </div>

</div>

<script>

new Vue({

    el:'#app',

    delimiters:["[[","]]"],

    data:{

        doctor_id:null,

        form:{

            Date:"",

            Start_time:"",

            End_time:""

        },

        availabilities:[]

    },

    methods:{

        loadData(){

            fetch('/doctor/availability/data',{

                credentials:"include"

            })

            .then(res => res.json())

            .then(data => {

                this.doctor_id =
                data.doctor_id

                this.availabilities =
                data.availabilities

            })

        },

        saveAvailability(){

            fetch(`/doctor/${this.doctor_id}/provide-a`,{

                method:"POST",

                credentials:"include",

                headers:{
                    "Content-Type":"application/json"
                },

                body:JSON.stringify(this.form)

            })

            .then(res => res.json())

            .then(data => {

                alert(data.message)

                this.loadData()

                this.form = {

                    Date:"",

                    Start_time:"",

                    End_time:""

                }

            })

        },

        goBack(){

            window.location =
            '/doctor_dashboard'

        }

    },

    mounted(){

        this.loadData()

    }

})

</script>

</body>
</html>
