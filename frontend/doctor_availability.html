<!DOCTYPE html>
<html>
<head>
    <title>Doctor Availability Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
    #main{
        border: 2px solid black;
        margin-top: 10px
    }
    #canvas{
        border: 2px solid black;
        width:60%;
        height:800px;
        margin:auto;
    }
    #form-body{
        height:420px;
        margin-top:50px;
    }
    </style>
</head>
<body>
    <div id="app">
    <div id="main">
        <div id="canvas">
                <h1>Doctor Availability</h1>
                <form @submit.prevent="saveAvailability">
                    <div class="mb-3">
                        <label class="form-label">Date</label>
                        <input type="date" class="form-control" v-model="form.Date" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Start time</label>
                        <input type="time" class="form-control" v-model="form.Start_time" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">End time</label>
                        <input type="time" class="form-control" v-model="form.End_time" required>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Save"><br>
                    </div>
                </form>
                <br>
                <br>
                <div v-if="availabilities.length > 0">
                <h4>Your Availabilities</h4>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Start Time</th>
                            <th>End Time</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="a in availabilities" :key="a.id">
                            <td>[[ a.Date ]]</td>
                            <td>[[ a.Start_time ]]</td>
                            <td>[[ a.End_time ]]</td>
                            <td>
                                <span v-if="a.Is_available" class="badge bg-success">Available</span>
                                <span v-else class="badge bg-danger">Not Available</span>       
                            </td>
                        </tr>    
                    </tbody>
                </table>
                <div v-else class="text-center mt-3">No Availabilities added yet!</div>
                <button class="btn btn-primary" @click="goBack">Back</button>
            </div>
        </div>
    </div>
    </div>
    <script>
        new Vue ({
            el: '#app',
            delimiters: ["[[","]]"],
            data: {
                doctor_id: null,

                form: {
                    Date: "",
                    Start_time: "",
                    End_time: ""
                },

                availabilities: []
            },
            methods: {
                loadData() {
                    fetch('/doctor/availability/data', {
                        credentials: "include"
                    })

                    .then(res => res.json())
                    .then(data => {
                        this.doctor_id = data.doctor_id;
                        this.availabilities = data.availabilities;
                    });
                },

                saveAvailability(){
                    fetch(`/doctor/${this.doctor_id}/provide-a`, {
                        method:"POST",
                        credentials: "include",
                        headers: {
                            "Content-Type":"application/json"
                        },
                        body: JSON.stringify(this.form)
                    })

                    .then(res => res.json())
                    .then(data => {
                        alert(data.message)
                        this.loadData();

                        this.form = {
                            Date: "",
                            Start_time: "",
                            End_time: ""
                        };
                    });
                },

                goBack() {
                    window.location =  `/doctor_dashboard`;
                }
            },

            mounted() {
                this.loadData();
            }
        });
    </script>
</body>
</html>
