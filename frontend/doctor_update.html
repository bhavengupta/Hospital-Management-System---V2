<!DOCTYPE html>
<html>
<head>

    <title>Update Patient History</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        body{

            margin:0;

            padding:30px;

            background:#f1f5f9;

            font-family:Arial, Helvetica, sans-serif;

        }

        #main-container{

            max-width:700px;

            margin:auto;

        }

        .card-box{

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.08);

        }

        .page-title{

            text-align:center;

            margin-bottom:25px;

            color:#0f172a;

            font-weight:bold;

        }

        .appointment-info{

            background:#eff6ff;

            padding:18px;

            border-radius:10px;

            margin-bottom:25px;

            border-left:5px solid #2563eb;

        }

        .appointment-info p{

            margin-bottom:8px;

            font-size:15px;

        }

        .form-label{

            font-weight:600;

            margin-bottom:6px;

        }

        .form-control{

            border-radius:10px;

            min-height:45px;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:none;

        }

        textarea.form-control{

            min-height:100px;

            resize:none;

        }

        .btn-update{

            width:100%;

            height:45px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:10px;

            font-weight:bold;

            transition:0.3s;

        }

        .btn-update:hover{

            background:#1d4ed8;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="main-container">

        <div class="card-box">

            <h2 class="page-title">

                <i class="fa-solid fa-notes-medical me-2"></i>

                Update Patient History

            </h2>

            <div
            v-if="appointment"
            class="appointment-info">

                <p>

                    <strong>Appointment ID:</strong>

                    [[ appointment.Appointment_id ]]

                </p>

                <p
                v-if="appointment.patient">

                    <strong>Patient Name:</strong>

                    [[ appointment.patient.Patient_name ]]

                </p>

                <p>

                    <strong>Date:</strong>

                    [[ appointment.Date ]]

                </p>

                <p>

                    <strong>Time:</strong>

                    [[ appointment.Time ]]

                </p>

            </div>

            <form @submit.prevent="updateData">

                <input
                type="hidden"
                v-model="form.appointment_id">

                <input
                type="hidden"
                v-model="form.doctor_id">

                <div class="mb-3">

                    <label class="form-label">

                        Tests Done

                    </label>

                    <input
                    type="text"
                    class="form-control"
                    v-model="form.Tests_done"
                    placeholder="Enter tests done"
                    required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Diagnosis

                    </label>

                    <input
                    type="text"
                    class="form-control"
                    v-model="form.Diagnosis"
                    placeholder="Enter diagnosis"
                    required>

                </div>

                <div class="mb-3">

                    <label class="form-label">

                        Prescription

                    </label>

                    <input
                    type="text"
                    class="form-control"
                    v-model="form.Prescription"
                    placeholder="Enter prescription"
                    required>

                </div>

                <div class="mb-4">

                    <label class="form-label">

                        Medicines

                    </label>

                    <textarea
                    class="form-control"
                    v-model="form.Medicines"
                    placeholder="Enter medicines details">

                    </textarea>

                </div>

                <button
                type="submit"
                class="btn-update">

                    Update History

                </button>

            </form>

        </div>

    </div>

</div>

<script>

new Vue({

    el:'#app',

    delimiters:["[[","]]"],

    data:{

        appointment:
        JSON.parse('{{ appointment | tojson }}'),

        form:{

            appointment_id:"",

            doctor_id:"",

            Tests_done:"",

            Diagnosis:"",

            Prescription:"",

            Medicines:""

        }

    },

    mounted(){

        this.form.appointment_id =
        this.appointment.Appointment_id

        this.form.doctor_id =
        this.appointment.Doctor_id

        this.form.Tests_done =
        this.appointment.Tests_done || ""

        this.form.Diagnosis =
        this.appointment.Diagnosis || ""

        this.form.Prescription =
        this.appointment.Prescription || ""

        this.form.Medicines =
        this.appointment.Medicines || ""

    },

    methods:{

        updateData(){

            fetch(`/doctor/update/${this.form.appointment_id}`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify(this.form)

            })

            .then(res => res.json())

            .then(data => {

                alert(data.message)

                window.location.href =
                '/doctor_dashboard'

            })

        }

    }

})

</script>

</body>
</html>
