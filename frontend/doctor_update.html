<!DOCTYPE html>
<html>
<head>
    <title>Update Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
        #form-body{
            height:646px;
            margin-top:50px;
        }
    </style>
</head>
<body>
    <div id="app">
    <!-- <div id="main">
        <div id="canvas"> -->
            <div id="form-body">
                <h4>Update Patient History</h4>
                <div v-if="appointment">
                    <p>Appointment id: [[ appointment.Appointment_id ]]</p>
                    <p v-if="appointment.patient">Patient Name: [[ appointment.patient.Patient_name ]]</p>
                    <p>Date: [[ appointment.Date ]]</p>
                    <p>Time: [[ appointment.Time ]]</p>
                </div>
                <form @submit.prevent="updateData">
                    <input type="hidden" v-model="form.appointment_id">
                    <input type="hidden" v-model="form.doctor_id">
                    <div class="mb-3">
                        <label class="form-label">Test-Done</label>
                        <input type="text" class="form-control" v-model="form.Tests_done" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Diagnosis</label>
                        <input type="text" class="form-control" v-model="form.Diagnosis" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Prescription</label>
                        <input type="text" class="form-control" v-model="form.Prescription" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Medicines</label>
                        <textarea class="form-control" rows="3" v-model="form.Medicines"></textarea>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Update">
                    </div>
                </form>
            </div>
        </div>
    <!-- </div>
    </div> -->
    <script>
    new Vue({
        el: '#app',
        delimiters: ["[[","]]"],
        data: {
            appointment: JSON.parse('{{ appointment | tojson }}'),

            form: {
                appointment_id: "",
                doctor_id: "",
                Tests_done: "",
                Diagnosis: "",
                Prescription: "",
                Medicines: ""
            }
        },

        mounted() {
            this.form.appointment_id = this.appointment.Appointment_id;
            this.form.doctor_id = this.appointment.Doctor_id;
            this.form.Tests_done = this.appointment.Tests_done || "";
            this.form.Diagnosis = this.appointment.Diagnosis || "";
            this.form.Prescription = this.appointment.Prescription || "";
            this.form.Medicines = this.appointment.Medicines || "";
            
        },

        methods: {
            updateData() {
                fetch(`/doctor/update/${this.form.appointment_id}`, {
                    method: "POST",
                    headers: {
                        "Content-Type":"application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify(this.form)
                })

                .then(res => res.json())
                .then(data => {
                    alert(data.message)
                    window.location.href = '/doctor_dashboard';
                });
            }
        }        
});
       
    </script>
</body>
</html>
