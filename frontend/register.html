<!DOCTYPE html>
<html>
<head>
    <title>Register Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
        #form-body{
            height:486px;
            margin-top:200px;
        }
    </style>
</head>
<body>
    <div id="app">
            <div id="form-body">
                <h1>Register Form</h1>
                <div v-if="message" :class="success ? 'alert alert-success' : 'alert alert-danger'">
                    [[ message ]]
                </div>
                <form @submit.prevent="register">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" v-model="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" v-model="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="Password" class="form-control" v-model="password" required>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Register"><br>
                        Are you a exisiting user? <a href="/login">Login</a>
                    </div>
                </form>
            </div>
    <script>
        new Vue({
            el: '#app',

            delimiters: ['[[', ']]'],

            data:{username:"", email:"",password:"", message:"", success:false},

            methods:{
                register(){
                    fetch("/register", {method:"POST",
                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({username:this.username, email:this.email, password:this.password})
                    })

                    .then(res => res.json().then(data => ({status: res.status, data})))
                    .then(({status, data}) => {
                        if (status != 200){
                            this.success = false
                            this.message = data.message || "Registration Failed!"
                            return 
                        }
                        this.success = true
                        this.message = data.message || "Registered Successfully!"

                        setTimeout(() => {
                            window.location = '/login'
                        }, 2000)
                        
                    })
                    
                    .catch(err =>{
                        console.log(err)
                        this.success = false
                        this.message = "Registration Failed. Try Again!"
                    })

                }
            }

        })

    </script>
</body>
</html>
