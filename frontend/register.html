<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hospital Management System | Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{

            font-family:Arial, Helvetica, sans-serif;

            background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        #app{

            width:100%;

            display:flex;

            justify-content:center;

            align-items:center;

        }

        #form-body{

            width:350px;

            background:rgba(255,255,255,0.12);

            backdrop-filter:blur(15px);

            padding:25px;

            border-radius:18px;

            box-shadow:0px 8px 25px rgba(0,0,0,0.2);

            border:1px solid rgba(255,255,255,0.2);

        }

        .icon{

            font-size:36px;

            text-align:center;

            color:white;

            margin-bottom:12px;

        }

        .hospital-title{

            text-align:center;

            color:white;

            font-weight:bold;

            margin-bottom:8px;

        }

       .sub-title{

            text-align:center;

            color:#dbeafe;

            margin-bottom:18px;

            font-size:13px;

        }

        .form-label{

            font-weight:600;

            color:white;

        }
        .form-control{

            height:42px;

            border-radius:10px;

            border:none;

            padding-left:40px;

        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:none;

        }

        .input-icon{

            position:absolute;

            top:38px;

            left:14px;

            color:#64748b;

            font-size:14px;

        }

        .btn-register{

            width:100%;

            height:50px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:12px;

            font-weight:bold;

            transition:0.3s;

        }

        .btn-register:hover{

            background:#1d4ed8;

        }

        .login-text{

            text-align:center;

            margin-top:20px;

            font-size:14px;

            color:white;

        }

        .login-text a{

            text-decoration:none;

            font-weight:bold;

            color:#93c5fd;

        }

        .login-text a:hover{

            color:white;

        }

        .alert{

            border-radius:10px;

        }

        .footer-text{

            text-align:center;

            margin-top:20px;

            color:#dbeafe;

            font-size:13px;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="form-body">

        <div class="icon">
            <i class="fa-solid fa-user-plus"></i>
        </div>

        <h2 class="hospital-title">
            Hospital Management System
        </h2>

        <p class="sub-title">
            Create your account
        </p>

        <div v-if="message"
        :class="success ? 'alert alert-success' : 'alert alert-danger'">

            [[ message ]]

        </div>

        <form @submit.prevent="register">

            <div class="mb-3 position-relative">

                <label class="form-label">
                    Username
                </label>

                <i class="fa-solid fa-user input-icon"></i>

                <input
                type="text"
                class="form-control"
                placeholder="Enter username"
                v-model="username"
                required>

            </div>

            <div class="mb-3 position-relative">

                <label class="form-label">
                    Email
                </label>

                <i class="fa-solid fa-envelope input-icon"></i>

                <input
                type="email"
                class="form-control"
                placeholder="Enter email"
                v-model="email"
                required>

            </div>

            <div class="mb-3 position-relative">

                <label class="form-label">
                    Password
                </label>

                <i class="fa-solid fa-lock input-icon"></i>

                <input
                type="password"
                class="form-control"
                placeholder="Enter password"
                v-model="password"
                required>

            </div>

            <button type="submit" class="btn-register">
                Register
            </button>

            <div class="login-text">

                Already a user?

                <a href="/login">
                    Login
                </a>

            </div>

            <p class="footer-text">
                Secure Healthcare Management Portal
            </p>

        </form>

    </div>

</div>

<script>

    new Vue({

        el:'#app',

        delimiters:['[[',']]'],

        data:{
            username:"",
            email:"",
            password:"",
            message:"",
            success:false
        },

        methods:{

            register(){

                fetch("/register",{

                    method:"POST",

                    headers:{
                        "Content-Type":"application/json"
                    },

                    body:JSON.stringify({

                        username:this.username,

                        email:this.email,

                        password:this.password

                    })

                })

                .then(res =>
                    res.json().then(data => ({
                        status:res.status,
                        data
                    }))
                )

                .then(({status,data}) => {

                    if(status != 200){

                        this.success = false

                        this.message =
                        data.message ||
                        "Registration Failed!"

                        return

                    }

                    this.success = true

                    this.message =
                    data.message ||
                    "Registered Successfully!"

                    setTimeout(() => {

                        window.location =
                        '/login'

                    },2000)

                })

                .catch(err => {

                    console.log(err)

                    this.success = false

                    this.message =
                    "Registration Failed. Try Again!"

                })

            }

        }

    })

</script>

</body>
</html>
