<!DOCTYPE html>
<html>
<head>

    <title>Book Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        body{

            margin:0;

            padding:30px;

            background:#f1f5f9;

            font-family:Arial, Helvetica, sans-serif;

        }

        #main-container{

            max-width:900px;

            margin:auto;

        }

        .card-box{

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.08);

        }

        .page-title{

            text-align:center;

            margin-bottom:25px;

            color:#0f172a;

            font-weight:bold;

        }

        .table{

            margin-top:20px;

        }

        .table thead{

            background:#2563eb;

            color:white;

        }

        .table th{

            padding:14px;

        }

        .table td{

            padding:14px;

            vertical-align:middle;

        }

        .btn-book{

            background:#2563eb;

            color:white;

            border:none;

            border-radius:8px;

            padding:8px 18px;

            font-weight:600;

        }

        .btn-book:hover{

            background:#1d4ed8;

        }

        .btn-back{

            margin-top:15px;

            background:#0f172a;

            color:white;

            border:none;

            border-radius:8px;

            padding:10px 20px;

            font-weight:600;

        }

        .btn-back:hover{

            background:#1e293b;

        }

        .empty-text{

            text-align:center;

            color:gray;

            padding:20px;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="main-container">

        <div class="card-box">

            <h2 class="page-title">

                <i class="fa-solid fa-calendar-check me-2"></i>

                Doctor Availability

            </h2>

            <table class="table table-bordered">

                <thead>

                    <tr>

                        <th>Date</th>

                        <th>Start Time</th>

                        <th>End Time</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody>

                    <tr
                    v-for="available in availabilities"
                    :key="available.Availability_id">

                        <td>

                            [[ available.Date ]]

                        </td>

                        <td>

                            [[ available.Start_time ]]

                        </td>

                        <td>

                            [[ available.End_time ]]

                        </td>

                        <td>

                            <button
                            class="btn-book"
                            @click="bookAppointment(available)">

                                Book Appointment

                            </button>

                        </td>

                    </tr>

                    <tr
                    v-if="availabilities.length === 0">

                        <td
                        colspan="4"
                        class="empty-text">

                            No availability slots available!

                        </td>

                    </tr>

                </tbody>

            </table>

            <button
            class="btn-back"
            @click="goBack()">

                Back

            </button>

        </div>

    </div>

</div>

<script>

new Vue({

    el:'#app',

    delimiters:["[[","]]"],

    data:{

        availabilities:[],

        patient_id:"{{ patient_id }}",

        doctor_id:"{{ doctor_id }}"

    },

    mounted(){

        this.loadData()

    },

    methods:{

        loadData(){

            fetch(`/patient/${this.patient_id}/availability/${this.doctor_id}`,{

                credentials:"include"

            })

            .then(res => res.json())

            .then(data => {

                console.log(data)

                this.availabilities =
                data.availabilities || []

            })

            .catch(err => console.log(err))

        },

        bookAppointment(available){

            fetch(`/patient/${this.patient_id}/appointment/${this.doctor_id}`,{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify({

                    Date:available.Date,

                    Time:available.Start_time

                })

            })

            .then(res => res.json())

            .then(data => {

                alert(data.message)

                if(data.message ===
                "Appointment booked successfully"){

                    window.location =
                    '/patient_dashboard'

                }

            })

            .catch(err => console.log(err))

        },

        goBack(){

            window.location =
            '/patient_dashboard'

        }

    }

})

</script>

</body>
</html>
