<!DOCTYPE html>
<html>
<head>
    <title>Patient Edit Profile Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
        #form-body{
            margin-top: 175px;
        }
    </style>
</head>
<body>
    <div id="app">
    <!-- <div id="main">
        <div id="canvas"> -->
            <div id="form-body">
                <h2>Update Patient</h2>
                <!-- <div v-if="message" :class="success ? 'alert alert-success' : 'alert alert-danger'">
                    [[ message ]]
                </div> -->
                <form @submit.prevent="updateProfile">
                    <div class="mb-3">
                        <label class="form-label">Username</label>
                        <input type="text" class="form-control" v-model="username" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Patient Name</label>
                        <input type="text" class="form-control" v-model="patient_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input type="text" class="form-control" v-model="password" required>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Update">
                    </div>
                </form>
            </div>
        </div>
    <!-- </div>
    </div> -->
    <script>
        new Vue({
            el: '#app',
            delimiters: ["[[","]]"],
            data: {
                patient_id: null,
                username: "",
                patient_name: "",
                password: ""
            },

            mounted() {
                this.loadData();
            },

            methods: {
                loadData() {
                    fetch('/patient/profile/data', {
                        credentials: "include"
                    })

                    .then(res => res.json())
                    .then(data => {
                        console.log(data)
                        this.patient_id = data.patient_id;
                        this.username = data.username;
                        this.patient_name = data.patient_name;
                    })

                    .catch(err => console.log(err))
                },

                updateProfile() {
                    fetch(`/patient/edit_profile/${this.patient_id}`, {
                        method: "PUT",
                        headers: {
                            "Content-Type":"application/json"
                        },
                        credentials: "include",
                        body: JSON.stringify({
                            username: this.username,
                            patient_name: this.patient_name,
                            password: this.password
                        })
                    })

                    .then(res => res.json())
                    .then(data => {
                        alert(data.message);
                        window.location = '/patient_dashboard'
                    })

                    .catch(err => console.log(err))
                }
            }
        })
    </script>
</body>
</html>
