<!DOCTYPE html>
<html>
<head>

    <title>Create Doctor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
    rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

    <style>

        body{

            background:#f1f5f9;

            font-family:Arial, Helvetica, sans-serif;

        }

        #app{

            display:flex;

            justify-content:center;

            align-items:center;

            padding:40px 0;

        }

        #form-body{

            width:420px;

            background:white;

            padding:30px;

            border-radius:18px;

            box-shadow:0px 5px 20px rgba(0,0,0,0.08);

        }

        .page-title{

            text-align:center;

            margin-bottom:25px;

            color:#0f172a;

            font-weight:bold;

        }

        .form-label{

            font-weight:600;

            margin-bottom:6px;

        }

        .form-control{

            height:45px;

            border-radius:10px;

        }

        .form-control:focus{

            box-shadow:none;

            border-color:#2563eb;

        }

        .btn-create{

            width:100%;

            height:45px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:10px;

            font-weight:bold;

        }

        .btn-create:hover{

            background:#1d4ed8;

        }

        .alert{

            border-radius:10px;

        }

    </style>

</head>

<body>

<div id="app">

    <div id="form-body">

        <h2 class="page-title">

            <i class="fa-solid fa-user-doctor me-2"></i>

            Add New Doctor

        </h2>

        <div
        v-if="message"
        :class="success ? 'alert alert-success' : 'alert alert-danger'">

            [[ message ]]

        </div>

        <form @submit.prevent="createDoctor">

            <div class="mb-3">

                <label class="form-label">

                    Full Name

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.Doctor_name"
                placeholder="Enter doctor name"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Specialisation / Department

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.Department_name"
                placeholder="Enter department"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Experience (Years)

                </label>

                <input
                type="number"
                class="form-control"
                v-model="form.Experience"
                placeholder="Enter experience"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Username

                </label>

                <input
                type="text"
                class="form-control"
                v-model="form.username"
                placeholder="Enter username"
                required>

            </div>

            <div class="mb-3">

                <label class="form-label">

                    Email

                </label>

                <input
                type="email"
                class="form-control"
                v-model="form.email"
                placeholder="Enter email"
                required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input
                type="password"
                class="form-control"
                v-model="form.password"
                placeholder="Enter password"
                required>

            </div>

            <button
            type="submit"
            class="btn-create">

                Create Doctor

            </button>

        </form>

    </div>

</div>

<script>

new Vue({

    el:'#app',

    delimiters:["[[","]]"],

    data:{

        form:{

            Doctor_name:"",

            Department_name:"",

            Experience:"",

            username:"",

            email:"",

            password:""

        },

        message:"",

        success:false

    },

    methods:{

        createDoctor(){

            fetch("/admin/add_doctor",{

                method:"POST",

                headers:{
                    "Content-Type":"application/json"
                },

                credentials:"include",

                body:JSON.stringify(this.form)

            })

            .then(res => res.json())

            .then(data => {

                this.message = data.message

                this.success = true

                setTimeout(() => {

                    window.location =
                    '/admin_dashboard'

                },2000)

                this.form = {

                    Doctor_name:"",

                    Department_name:"",

                    Experience:"",

                    username:"",

                    email:"",

                    password:""

                }

            })

            .catch(err => {

                console.log(err)

                this.message =
                "Something went wrong!"

                this.success = false

            })

        }

    }

})

</script>

</body>
</html>
