<!DOCTYPE html>
<html>
<head>
    <title>Create Page</title>
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" 
    rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" 
    crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>
    <style>
        #form-body{
    border:1px solid grey;
    width:300px;
    height:702px;
    margin:auto;
    margin-top:70px;
    border-radius:5px;
    padding:10px
}
    </style>
</head>
<body>
    <div id="app">
            <div id="form-body">
                <h2>Add a new doctor</h2>
                    <div v-if="message" :class="success ? 'alert alert-success' : 'alert alert-danger'">
                        [[ message ]]
                    </div>
                <form @submit.prevent="createDoctor">
                    <div class="mb-3">
                        <label>Fullname</label>
                        <input type="text" class="form-control" v-model="form.Doctor_name" required>
                    </div>
                    <div class="mb-3">
                        <label>Specialisation/ Department</label>
                        <input type="text" class="form-control" v-model="form.Department_name" required>
                    </div>
                    <div class="mb-3">
                        <label>Experience (in years)</label>
                        <input type="number" class="form-control" v-model="form.Experience" required>
                    </div>
                    <div class="mb-3">
                        <label>Username</label>
                        <input type="text" class="form-control" v-model="form.username" required>
                    </div>
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="text" class="form-control" v-model="form.email" required>
                    </div>
                    <div class="mb-3">
                        <label>Password</label>
                        <input type="password" class="form-control" v-model="form.password" required>
                    </div>
                    <div class="text-center">
                        <input type="submit" class="btn btn-primary" value="Create">
                    </div>
                </form>
            </div>
        </div>
    <script>
        new Vue ({
        el: '#app',
        delimiters: ["[[","]]"],
        data: {
            form:{
                Doctor_name: "",
                Department_name: "",
                Experience: "",
                username: "",
                email: "",
                password: ""
            },
            message: "",
            success: false
        },

        methods: {
            createDoctor: function() {
                fetch("/admin/add_doctor", {
                    method: "POST",
                    headers: {
                        "Content-Type":"application/json"
                    },
                    credentials: "include",
                    body: JSON.stringify(this.form)
                })
                .then(res => res.json())
                .then((data) => {
                    this.message = data.message;
                    this.success = true;

                    setTimeout(() => {
                        window.location = '/admin_dashboard'
                    }, 2000)

                    this.form = {
                        Doctor_name: "",
                        Department_name: "",
                        Experience: "",
                        username: "",
                        email: "",
                        password: ""
                    };
                })

                .catch((err) => {
                    console.log(err);
                    this.message = "Something went wrong!";
                    this.success = false;
                });
            }
        }
    })
        
    </script>
</body>
</html>
